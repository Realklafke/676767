<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal de Redes Industriais e Indústria 4.0</title>
  <style>
    :root {
      --bg-color: #f4f7f9;
      --text-dark: #0f2c41;
      --text-muted: #546e7a;
      --primary: #0b2b44;
      --accent: #0097a7;
      --accent-hover: #00b8cc;
      --white: #ffffff;
      --border: #cfd8dc;
      --success: #2e7d32;
      --danger: #c62828;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    /* Container Principal - Maior e mais largo */
    .container {
      max-width: 1200px;
      width: 100%;
      background: var(--white);
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(11, 43, 68, 0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Header Gigante */
    .hero-header {
      background: linear-gradient(135deg, var(--primary) 0%, #1a4a6e 100%);
      color: var(--white);
      padding: 40px 50px;
      position: relative;
    }

    .hero-header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: var(--accent);
    }

    .hero-header h1 {
      font-size: 2.8rem;
      margin-bottom: 10px;
      font-weight: 700;
      letter-spacing: -1px;
    }

    .hero-header p {
      font-size: 1.15rem;
      color: #b0bec5;
      max-width: 800px;
      line-height: 1.6;
    }

    /* Layout com Menu Lateral para as 4 seções */
    .main-layout {
      display: flex;
      flex-direction: column;
    }

    @media (min-width: 900px) {
      .main-layout {
        flex-direction: row;
      }
    }

    /* Navegação Principal (Abas Superiores/Laterais) */
    .nav-menu {
      background: #eceff1;
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
    }

    @media (min-width: 900px) {
      .nav-menu {
        flex-direction: column;
        width: 280px;
        min-width: 280px;
        border-bottom: none;
        border-right: 1px solid var(--border);
      }
    }

    .nav-item {
      padding: 20px 25px;
      background: transparent;
      border: none;
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-muted);
      text-align: left;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 12px;
      white-space: nowrap;
    }

    .nav-item:hover {
      background: #e0e5e9;
      color: var(--primary);
    }

    .nav-item.active {
      background: var(--white);
      color: var(--accent);
      border-left: 5px solid var(--accent);
    }

    @media (max-width: 899px) {
      .nav-item.active {
        border-left: none;
        border-bottom: 5px solid var(--accent);
      }
    }

    /* Área de Conteúdo */
    .content-area {
      flex: 1;
      padding: 40px;
      background: var(--white);
      min-height: 600px;
    }

    .section-content {
      display: none;
      animation: fadeIn 0.4s ease;
    }

    .section-content.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Grid de Opções Internas (Cards/Botões) */
    .options-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin-bottom: 30px;
    }

    .option-card {
      background: #f8f9fa;
      border: 2px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: 0.2s;
    }

    .option-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(0, 151, 167, 0.1);
    }

    .option-card.selected {
      border-color: var(--accent);
      background: #e0f7fa;
    }

    .option-icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .option-title {
      font-weight: 700;
      color: var(--primary);
      font-size: 1.1rem;
    }

    /* Painel de Exibição Dinâmico */
    .display-panel {
      background: var(--white);
      border-radius: 16px;
      padding: 30px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.03);
    }

    .display-panel h2 {
      font-size: 1.8rem;
      color: var(--primary);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .display-desc {
      font-size: 1.1rem;
      line-height: 1.7;
      color: var(--text-muted);
      margin-bottom: 25px;
    }

    /* Badges */
    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 25px;
    }

    .badge {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      font-weight: bold;
      text-transform: uppercase;
      background: #eceff1;
      color: var(--text-dark);
    }

    /* Tabelas */
    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    th, td {
      padding: 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    th {
      background: #f4f7f9;
      color: var(--primary);
      font-weight: 600;
    }

    /* Listas Prós e Contras */
    .pros-cons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .list-box h4 { margin-bottom: 10px; font-size: 1.1rem; }
    .list-box.pros h4 { color: var(--success); }
    .list-box.cons h4 { color: var(--danger); }
    
    .list-box ul { list-style: none; }
    .list-box li {
      margin-bottom: 8px;
      padding-left: 24px;
      position: relative;
      color: var(--text-muted);
      line-height: 1.5;
    }
    
    .list-box.pros li::before {
      content: '✔'; position: absolute; left: 0; color: var(--success); font-weight: bold;
    }
    .list-box.cons li::before {
      content: '✖'; position: absolute; left: 0; color: var(--danger); font-weight: bold;
    }

  </style>
</head>
